<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Espada — TariffShield Operator Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Map Dependencies -->
<script src="https://unpkg.com/d3@7.8.5/dist/d3.min.js"></script>

<style>
@font-face {
  font-family: 'Gatilca';
  src: url('./fonts/GatilcaDemoRegular-q2ORq.ttf') format('truetype');
  font-weight: 400; font-style: normal; font-display: swap;
}
:root {
  --grey-000:#FFFFFF;--grey-025:#FAFAFB;--grey-050:#F4F4F6;--grey-100:#ECECEF;
  --grey-150:#E1E1E6;--grey-200:#D2D3D9;--grey-300:#B3B5BE;--grey-400:#8A8D98;
  --grey-500:#6A6D78;--grey-600:#4B4E57;--grey-700:#34363D;--grey-800:#22242A;
  --grey-900:#141519;--grey-950:#09090B;
  --orange-050:#FDEFE8;--orange-300:#EA936F;--orange-500:#D97757;
  --orange-600:#BC5A3B;--orange-700:#8F4128;
  --sev-critical:#D14343;--sev-high:#D97757;--sev-medium:#C49A2B;--sev-low:#4F8F5A;
  --domain-reshore:#4C6FAE;--domain-nearshore:#B08038;--domain-dualsource:#6D7588;
  --canvas-gradient: radial-gradient(at 20% 0%,#FDEFE8 0%,transparent 50%),
                     radial-gradient(at 100% 30%,#E8EDF5 0%,transparent 45%),
                     linear-gradient(180deg,#F8F8FA,#EEEEF2);
  --glass-bg:rgba(255,255,255,0.68);--glass-thick-bg:rgba(255,255,255,0.82);
  --glass-border-lo:rgba(20,21,25,0.06);--glass-blur:18px;--glass-blur-heavy:28px;
  --shadow-glass-1:0 1px 0 rgba(255,255,255,.8) inset,0 -1px 0 rgba(20,21,25,.04) inset,
                   0 1px 2px rgba(20,21,25,.04),0 8px 24px -8px rgba(20,21,25,.08);
  --shadow-glass-2:0 1px 0 rgba(255,255,255,.9) inset,0 -1px 0 rgba(20,21,25,.05) inset,
                   0 4px 8px rgba(20,21,25,.06),0 24px 48px -16px rgba(20,21,25,.14);
  --specular:linear-gradient(180deg,rgba(255,255,255,.7) 0%,rgba(255,255,255,0) 40%);
  --fg-1:var(--grey-900);--fg-2:var(--grey-600);--fg-3:var(--grey-500);--fg-4:var(--grey-400);
  --fg-on-dark:var(--grey-050);
  --border-1:var(--grey-150);--border-2:var(--grey-200);
  --accent:var(--orange-500);--accent-hover:var(--orange-600);--accent-press:var(--orange-700);
  --status-ok:var(--sev-low);--status-danger:var(--sev-critical);--status-warn:var(--sev-medium);
  --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  --font-mono:'JetBrains Mono','SF Mono',Menlo,Consolas,monospace;
  --font-display:'Gatilca','Inter',serif;
  --radius-2:10px;--radius-3:14px;--radius-4:20px;--radius-full:999px;
  --motion-fast:150ms;--motion-base:240ms;--ease-glass:cubic-bezier(0.22,1,0.36,1);
}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;font-family:var(--font-sans);font-size:14px;line-height:20px;
  color:var(--fg-1);background:var(--canvas-gradient);background-attachment:fixed;
  min-height:100vh;-webkit-font-smoothing:antialiased; overflow:hidden;}
#root{min-height:100vh;}
table{border-collapse:collapse;width:100%;}
button{font-family:var(--font-sans);}
input,textarea,select{font-family:var(--font-mono);}
.eyebrow{font-family:var(--font-mono);font-size:11px;font-weight:500;
  letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);}
.h4{font-weight:600;font-size:22px;line-height:30px;margin:0;}
.h5{font-weight:600;font-size:18px;line-height:26px;margin:0;}
.body-sm{font-size:13px;line-height:18px;color:var(--fg-2);}

/* Map Layout Grid */
.layout-grid {
  display: grid;
  height: 100vh;
  grid-template-rows: 70px 1fr 80px;
  grid-template-columns: 320px 1fr 340px;
  grid-template-areas: 
    "header header header"
    "left center right"
    "left bottom right";
}
.header-area { grid-area: header; z-index: 20; }
.left-area { grid-area: left; padding: 20px 0 20px 20px; overflow-y: auto; z-index: 10; scrollbar-width: none; }
.center-area { grid-area: center; position: relative; }
.right-area { grid-area: right; padding: 20px 20px 20px 20px; overflow-y: auto; z-index: 10; scrollbar-width: none; }
.bottom-area { grid-area: bottom; padding: 10px 20px; display: flex; align-items: center; justify-content: center; z-index: 15; pointer-events: none; }
.left-area::-webkit-scrollbar, .right-area::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API = "http://localhost:8000/api/v1";

async function api(method, path, body) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (!r.ok) {
    const t = await r.text().catch(() => "");
    throw new Error(`${r.status}: ${t}`);
  }
  return r.json();
}

function Glass({ children, style, thick, dark, padding = 24 }) {
  return (
    <div style={{
      position:'relative',
      background: dark ? 'rgba(20,21,25,.86)' : thick ? 'var(--glass-thick-bg)' : 'var(--glass-bg)',
      backdropFilter: thick ? 'blur(28px) saturate(160%)' : 'blur(18px) saturate(140%)',
      WebkitBackdropFilter: thick ? 'blur(28px) saturate(160%)' : 'blur(18px) saturate(140%)',
      border: dark ? '1px solid rgba(255,255,255,.08)' : '1px solid var(--glass-border-lo)',
      borderRadius:'var(--radius-3)',
      boxShadow: thick ? 'var(--shadow-glass-2)' : 'var(--shadow-glass-1)',
      padding, overflow:'hidden',
      color: dark ? 'var(--fg-on-dark)' : 'var(--fg-1)',
      ...style,
    }}>
      {!dark && <div style={{position:'absolute',inset:0,background:'var(--specular)',pointerEvents:'none',borderRadius:'inherit'}}/>}
      <div style={{position:'relative'}}>{children}</div>
    </div>
  );
}

function Chip({ children, bg, fg }) {
  return (
    <span style={{fontFamily:'var(--font-mono)',fontSize:11,fontWeight:500,letterSpacing:'.06em',
      padding:'3px 10px',borderRadius:999,background:bg,color:fg,
      display:'inline-flex',alignItems:'center',gap:6,whiteSpace:'nowrap'}}>
      {children}
    </span>
  );
}

const SEV = {
  CRITICAL:{bg:'rgba(209,67,67,.10)',fg:'#D14343'},
  HIGH:{bg:'rgba(217,119,87,.14)',fg:'#BC5A3B'},
  MEDIUM:{bg:'rgba(196,154,43,.14)',fg:'#8F6F1A'},
  LOW:{bg:'rgba(79,143,90,.14)',fg:'#35683F'},
};

function sevFromScore(score) {
  if (score >= 0.75) return 'CRITICAL';
  if (score >= 0.5) return 'HIGH';
  if (score >= 0.25) return 'MEDIUM';
  return 'LOW';
}

function Btn({ children, onClick, variant='primary', disabled=false, small=false, style={} }) {
  const base = {
    fontFamily:'var(--font-sans)',fontWeight:500,border:'none',cursor:disabled?'not-allowed':'pointer',
    borderRadius:'var(--radius-2)',transition:'all var(--motion-fast)',
    fontSize: small ? 12 : 14, padding: small ? '6px 12px' : '11px 18px',
    ...style,
  };
  const variants = {
    primary:{ background:disabled?'rgba(20,21,25,.08)':'var(--accent)', color:disabled?'var(--fg-3)':'#fff',
      boxShadow:disabled?'none':'0 1px 0 rgba(255,255,255,.3) inset,0 6px 20px -8px rgba(217,119,87,.5)'},
    danger:{ background:'transparent',color:'var(--status-danger)',
      border:'1px solid rgba(209,67,67,.4)'},
    ghost:{ background:'rgba(255,255,255,.6)',color:'var(--fg-2)',
      border:'1px solid var(--glass-border-lo)'},
  };
  return <button onClick={onClick} disabled={disabled} style={{...base,...variants[variant]}}>{children}</button>;
}

function LIcon({ name, size=16, color, style }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    ref.current.innerHTML='';
    const el = document.createElement('i');
    el.setAttribute('data-lucide', name);
    ref.current.appendChild(el);
    lucide.createIcons({ attrs:{ 'stroke-width':1.5 }});
  }, [name]);
  return <span ref={ref} style={{display:'inline-flex',width:size,height:size,color,...style}}/>;
}

function StatusChip({ status }) {
  const map = {
    running:    {bg:'rgba(79,143,90,.1)', fg:'#35683F',   label:'RUNNING'},
    awaiting_approval:{bg:'rgba(217,119,87,.14)',fg:'#BC5A3B',label:'AWAITING APPROVAL'},
    approved:   {bg:'rgba(79,143,90,.14)',fg:'#35683F',   label:'APPROVED'},
    edited:     {bg:'rgba(196,154,43,.12)',fg:'#8F6F1A',  label:'EDITED'},
    rejected:   {bg:'rgba(209,67,67,.10)',fg:'#D14343',   label:'REJECTED'},
    error:      {bg:'rgba(209,67,67,.10)',fg:'#D14343',   label:'ERROR'},
  };
  const s = map[status] || {bg:'var(--grey-100)',fg:'var(--fg-3)',label:status};
  return <Chip bg={s.bg} fg={s.fg}>{s.label}</Chip>;
}

/* ──────────────────────────────────────────────────────────────────────────
   D3 WORLD MAP (CENTER)
────────────────────────────────────────────────────────────────────────── */
function D3WorldMap({ events, boms }) {
  const svgRef = useRef();
  
  useEffect(() => {
    // We proxy through unpkg for world geojson
    fetch('https://unpkg.com/world-atlas@2.0.2/countries-110m.json')
      .then(r => r.json())
      .then(world => {
         const countries = topojson.feature(world, world.objects.countries).features;
         const svg = d3.select(svgRef.current);
         svg.selectAll("*").remove();

         const node = svg.node();
         if (!node) return;
         const width = node.getBoundingClientRect().width;
         const height = node.getBoundingClientRect().height;

         // Projection tuned to center US/Europe/Asia
         const projection = d3.geoNaturalEarth1()
            .scale(width / 5.5)
            .translate([width / 2, height / 2 + 50]);
         const path = d3.geoPath().projection(projection);

         const g = svg.append("g");

         // Draw countries
         g.selectAll("path.country")
            .data(countries)
            .enter().append("path")
            .attr("class", "country")
            .attr("d", path)
            .attr("fill", "var(--glass-thick-bg)")
            .attr("stroke", "rgba(0,0,0,0.06)")
            .attr("stroke-width", 1)
            .transition().duration(1000)
            .attr("fill", d => {
              // Highlight China (ISO 156) if there are events
              if(events.length > 0 && d.id === "156") return "rgba(209,67,67,0.15)";
              return "rgba(255,255,255,0.7)";
            });

         // Add connections to US (ISO 840 or rough coords) 
         const usCoords = projection([-95.7, 37.0]);
         const cnCoords = projection([104.1, 35.8]); // China
         const twCoords = projection([120.9, 23.6]); // Taiwan
         
         if (events.length > 0 && usCoords && cnCoords && twCoords) {
             const defs = svg.append("defs");
             const filter = defs.append("filter").attr("id", "glow");
             filter.append("feGaussianBlur").attr("stdDeviation", "3").attr("result", "coloredBlur");
             const feMerge = filter.append("feMerge");
             feMerge.append("feMergeNode").attr("in", "coloredBlur");
             feMerge.append("feMergeNode").attr("in", "SourceGraphic");

             // Arc from China to US
             const drawArc = (source, target, color) => {
               const arc = d3.line().curve(d3.curveBasis)([
                 source,
                 [ (source[0]+target[0])/2, Math.min(source[1], target[1]) - 150 ],
                 target
               ]);
               
               const line = svg.append("path")
                  .attr("d", arc)
                  .attr("fill", "none")
                  .attr("stroke", color)
                  .attr("stroke-width", 2)
                  .attr("stroke-dasharray", "6,4")
                  .attr("opacity", 0.8)
                  .style("filter", "url(#glow)");

               const totalLength = line.node().getTotalLength();
               line
                 .attr("stroke-dasharray", totalLength + " " + totalLength)
                 .attr("stroke-dashoffset", totalLength)
                 .transition()
                 .duration(2000)
                 .attr("stroke-dashoffset", 0)
                 .on("end", function() {
                    d3.select(this)
                      .attr("stroke-dasharray", "6,4")
                      .style("animation", "dash 20s linear infinite");
                 });
             };

             drawArc(cnCoords, usCoords, "var(--sev-critical)");
             drawArc(twCoords, usCoords, "var(--domain-reshore)");

             // Pulse circles at source
             const drawPulse = (coords, color) => {
               svg.append("circle")
                  .attr("cx", coords[0]).attr("cy", coords[1])
                  .attr("r", 4).attr("fill", color)
                  .append("animate")
                  .attr("attributeName", "r")
                  .attr("values", "4;12;4")
                  .attr("dur", "2s")
                  .attr("repeatCount", "indefinite");
               svg.append("circle")
                  .attr("cx", coords[0]).attr("cy", coords[1])
                  .attr("r", 4).attr("fill", color)
                  .append("animate")
                  .attr("attributeName", "opacity")
                  .attr("values", "1;0;1")
                  .attr("dur", "2s")
                  .attr("repeatCount", "indefinite");
             };

             drawPulse(cnCoords, "var(--sev-critical)");
             drawPulse(twCoords, "var(--domain-reshore)");
             drawPulse(usCoords, "var(--fg-1)"); // US destination hub
         }
      });
  }, [events, boms]);

  return (
    <>
      <style>{`@keyframes dash { to { stroke-dashoffset: -1000; } }`}</style>
      <svg ref={svgRef} style={{width:'100%', height:'100%', pointerEvents:'none'}}/>
    </>
  );
}

/* ──────────────────────────────────────────────────────────────────────────
   APP HEADER
────────────────────────────────────────────────────────────────────────── */
function AppHeader({ page, setPage, apiOk, onSeed }) {
  const tabs = [
    {id:'dashboard', label:'Global Map', icon:'radar'},
    {id:'company', label:'Upload BOM', icon:'package'},
    {id:'events', label:'Tariff Signals', icon:'zap'},
    {id:'scenarios', label:'HITL & Scenarios', icon:'shield-check'},
    {id:'report', label:'Audit Log', icon:'file-clock'},
  ];
  return (
    <div className="header-area" style={{display:'flex',alignItems:'center',justifyContent:'space-between',
      padding:'0 32px', borderBottom:'1px solid var(--glass-border-lo)',
      background:'rgba(255,255,255,.45)', backdropFilter:'blur(18px)', minHeight:70}}>
      
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <img src="./assets/espada-mark.svg" width="32" height="32" alt=""/>
        <span style={{fontWeight:600,fontSize:20,letterSpacing:'-.02em'}}>espada</span>
      </div>

      <div style={{display:'flex',gap:8}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setPage(t.id)} title={t.label} style={{
            background: page===t.id ? 'rgba(255,255,255,0.7)' : 'transparent',
            border:'none', padding:'8px 16px', borderRadius:'100px',
            fontSize:14, fontWeight:page===t.id?500:400, color:page===t.id?'var(--fg-1)':'var(--fg-2)',
            display:'flex', alignItems:'center', gap:8, cursor:'pointer',
            transition:'all var(--motion-fast)',
            boxShadow: page===t.id ? 'var(--shadow-glass-1)' : 'none'
          }}>
            <LIcon name={t.icon} size={16}/>
            <span style={{display: page===t.id ? 'inline' : 'none'}}>{t.label}</span>
          </button>
        ))}
      </div>

      <div style={{display:'flex',alignItems:'center',gap:16}}>
        <Btn variant="ghost" small onClick={onSeed}>Load Demo</Btn>
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 12px',borderRadius:999,
          background:apiOk?'rgba(79,143,90,.14)':'rgba(209,67,67,.1)',
          color:apiOk?'#35683F':'#D14343',
          fontFamily:'var(--font-mono)',fontSize:11,fontWeight:500,letterSpacing:'.06em'}}>
          <span style={{width:6,height:6,borderRadius:999,
            background:apiOk?'#4F8F5A':'#D14343',
            boxShadow:apiOk?'0 0 8px #4F8F5A':'none',display:'inline-block'}}/>
          {apiOk ? 'API LIVE' : 'API OFFLINE'}
        </div>
      </div>
    </div>
  );
}


/* ──────────────────────────────────────────────────────────────────────────
   SIDE PANELS
────────────────────────────────────────────────────────────────────────── */
function ProductsPanel({ boms }) {
  // Use uploaded BOMs to simulate "Products" on the left panel
  const products = boms.length > 0 ? boms.map((b,i)=>({id:b.id, name:`Product ${i+1}`})) : [
    {id:'p1', name:'Product 1'},
    {id:'p2', name:'Product 2'},
    {id:'p3', name:'Product 3'},
  ];

  return (
    <div className="left-area" style={{display:'flex', flexDirection:'column', gap:16}}>
      <div className="eyebrow" style={{marginBottom:4, marginLeft:4}}>Products</div>
      {products.map(p => (
        <Glass key={p.id} padding={16} style={{cursor:'pointer', transition:'transform var(--motion-fast)'}} 
               onMouseOver={e=>e.currentTarget.style.transform='translateY(-2px)'}
               onMouseOut={e=>e.currentTarget.style.transform='none'}>
          <div style={{display:'flex', alignItems:'center', gap:12}}>
            <div style={{width:40,height:40,borderRadius:10,background:'rgba(76,111,174,0.1)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <LIcon name="box" size={20} color="#4C6FAE"/>
            </div>
            <div>
              <div style={{fontWeight:600, fontSize:15}}>{p.name}</div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--fg-3)',marginTop:2}}>
                 {boms.length>0 ? 'BOM Connected' : 'Demo Mode'}
              </div>
            </div>
          </div>
        </Glass>
      ))}
      <Btn variant="ghost" style={{marginTop:'auto'}}>+ Upload BOM</Btn>
    </div>
  );
}

function EventsPanel({ events }) {
  // Events on the right panel
  const displayEvents = events.slice(0, 3);
  
  return (
    <div className="right-area" style={{display:'flex', flexDirection:'column', gap:16}}>
      <div className="eyebrow" style={{marginBottom:4, marginLeft:4}}>Tariff Signals</div>
      {displayEvents.length === 0 ? (
        <Glass padding={20} style={{textAlign:'center'}}>
          <div className="body-sm">No active events.</div>
        </Glass>
      ) : displayEvents.map(ev => (
        <Glass key={ev.id} padding={16}>
          <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:8}}>
            <Chip bg='rgba(209,67,67,.1)' fg='#D14343'>{ev.threat_level || 'EVENT'}</Chip>
            <div className="eyebrow">{ev.source||'manual'}</div>
          </div>
          <div style={{fontWeight:600,fontSize:14,marginBottom:6, lineHeight:'20px'}}>{ev.title}</div>
          <div style={{fontSize:12,color:'var(--fg-2)',marginBottom:12, display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical', overflow:'hidden'}}>
            {ev.description||ev.raw_excerpt}
          </div>
          
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',borderTop:'1px solid var(--border-1)',paddingTop:12}}>
            <div style={{fontFamily:'var(--font-mono)',fontSize:10,color:'#D14343'}}>
              {ev.rate_change_hint || 'Rate unknown'}
            </div>
            <Btn small variant="ghost">Map Impact</Btn>
          </div>
        </Glass>
      ))}
      
      {/* Recs / Hitl Gate snippet */}
      <Glass thick dark padding={18} style={{marginTop:'auto'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,color:'var(--orange-300)'}}>
           <LIcon name="shield-check" size={16}/>
           <div style={{fontWeight:600, fontSize:13}}>HITL Gate Ready</div>
        </div>
        <div style={{fontSize:12, color:'var(--fg-4)', marginBottom:12}}>1 pending authorization</div>
        <Btn small style={{width:'100%'}}>Review Scenarios</Btn>
      </Glass>
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────────────────
   TIMELINE (BOTTOM)
────────────────────────────────────────────────────────────────────────── */
function TimelinePanel() {
  const dates = [
    { label: "Yesterday", date: "Apr 17, 2026", active: false },
    { label: "Today", date: "Apr 18, 2026", active: true },
    { label: "Tomorrow", date: "Apr 19, 2026", active: false },
  ];

  return (
    <div className="bottom-area">
      <Glass padding="12px 24px" style={{display:'flex', alignItems:'center', gap:40, pointerEvents:'auto'}}>
        {dates.map((d, i) => (
          <div key={i} style={{display:'flex', flexDirection:'column', alignItems:'center', opacity: d.active ? 1 : 0.5}}>
            <div style={{width:2, height:12, background: d.active?'var(--accent)':'var(--fg-3)', marginBottom:8, borderRadius:2}}/>
            <div style={{fontFamily:'var(--font-mono)',fontSize:11,fontWeight:600,color:d.active?'var(--fg-1)':'var(--fg-3)',marginBottom:2}}>{d.date}</div>
            <div className="eyebrow">{d.label}</div>
          </div>
        ))}
      </Glass>
    </div>
  );
}


/* ──────────────────────────────────────────────────────────────────────────
   MAIN CONTAINER
────────────────────────────────────────────────────────────────────────── */
function MapDashboard({ boms, events }) {
  return (
    <>
      <ProductsPanel boms={boms} />
      <div className="center-area">
         <D3WorldMap events={events} boms={boms} />
         
         {/* Map Overlay Title */}
         <div style={{position:'absolute', top:30, left:40, pointerEvents:'none'}}>
            <div className="h4" style={{letterSpacing:'-0.02em'}}>Global Supply Matrix</div>
            <div className="body-sm" style={{marginTop:4, display:'flex', alignItems:'center', gap:8}}>
               <span style={{width:8, height:8, borderRadius:4, background:'var(--sev-critical)'}}/> High Risk Corridors
            </div>
         </div>
      </div>
      <TimelinePanel />
      <EventsPanel events={events} />
    </>
  );
}


/* ──────────────────────────────────────────────────────────────────────────
   APP ROOT
────────────────────────────────────────────────────────────────────────── */

/* --- RESTORED COMPONENTS --- */


/* --- RESTORED COMPONENTS --- */

function App() {
  const [page, setPage]   = useState('dashboard');
  const [apiOk, setApiOk] = useState(false);
  const [events, setEvents] = useState([]);
  const [boms, setBoms]     = useState([]);
  const [targetRec, setTargetRec] = useState(null);

  useEffect(()=>{
    api('GET','/health').then(()=>setApiOk(true)).catch(()=>setApiOk(false));
    api('GET','/events').then(d=>setEvents(d.events||[])).catch(()=>{});
    api('GET','/boms').then(setBoms).catch(()=>{});

    const t = setInterval(()=>{
      api('GET','/health').then(()=>setApiOk(true)).catch(()=>setApiOk(false));
    }, 5000);
    return ()=>clearInterval(t);
  }, []);

  // Quick action helpers
  async function seedDemo() {
    try { await api('POST','/demo/seed'); api('GET','/boms').then(setBoms); api('GET','/events').then(d=>setEvents(d.events||[])); }
    catch(e) { alert(e.message); }
  }

  const navigate = (p) => setPage(p);

  return (
    <div className={page === 'dashboard' ? 'layout-grid' : ''} style={page !== 'dashboard' ? {minHeight:'100vh', display:'flex', flexDirection:'column'} : {}}>
      <AppHeader page={page} setPage={setPage} apiOk={apiOk} onSeed={seedDemo} />
      
      {page === 'dashboard' && <MapDashboard boms={boms} events={events} />}
      
      {page !== 'dashboard' && (
        <main style={{padding:'40px', flex:1, margin:'0 auto', width:'100%', maxWidth:'1200px', overflowY:'auto'}}>
          {page === 'company' && <UploadPage />}
          {page === 'report' && <AuditPage />}
          {page === 'events' && <EventsPage setPage={navigate} setTargetRec={setTargetRec} />}
          {page === 'scenarios' && <RecommendationsPage targetRec={targetRec} setTargetRec={setTargetRec} setPage={navigate} />}
        </main>
      )}
    </div>
  );
}



ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
